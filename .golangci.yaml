version: "2"

run:
  timeout: 10m

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - copyloopvar
    - gocritic
    - gosec
    - misspell
    - revive
    - unconvert
    - unparam
  settings:
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: errorf
        - name: if-return
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: var-naming
  exclusions:
    generated: lax
    presets:
      - comments
      - std-error-handling
      - common-false-positives
      - legacy
    rules:
      - linters: # Exercise packages are named after their directories (digits, underscores, MixedCaps)
          - revive
        text: "don't use (an underscore|MixedCaps) in package name"
      - path: _test\.go
        linters:
          - gosec

issues:
  # Exercise code committed before the v2 config is kept as-is;
  # only lines changed after this commit are linted.
  new-from-rev: e8b03638af4dcfe6162ed331385987f237646aee

formatters:
  enable:
    - gci
    - gofumpt
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/OlexandrPodustov)
  exclusions:
    generated: lax
