name: Go CI

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yaml"
      - ".github/workflows/go-ci.yml"
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yaml"
      - ".github/workflows/go-ci.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # full history: golangci-lint resolves issues.new-from-rev against it
          fetch-depth: 0

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test ./...

      - name: lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
