name: Go CI

on:
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yaml"
      - ".github/workflows/go-ci.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test ./...

      - name: lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.54.2
